<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SKILLING IT – Login</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;700;800&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--red:#e60000;--charcoal:#25282b;--white:#fff;--grey:#7e7e7e;--grey-light:#f2f2f2;--display:'Barlow Condensed',sans-serif;--body:'Barlow',sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--body);background:var(--charcoal);color:var(--white);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(90deg,transparent,transparent 99px,rgba(255,255,255,0.02) 99px,rgba(255,255,255,0.02) 100px),repeating-linear-gradient(0deg,transparent,transparent 99px,rgba(255,255,255,0.02) 99px,rgba(255,255,255,0.02) 100px);pointer-events:none}
body::after{content:'';position:fixed;top:-20%;right:-10%;width:600px;height:600px;background:radial-gradient(circle,rgba(230,0,0,0.12) 0%,transparent 65%);pointer-events:none}
.auth-container{position:relative;z-index:2;width:100%;max-width:480px;padding:24px}
.brand{text-align:center;margin-bottom:40px}
.brand-logo{width:64px;height:64px;background:var(--red);border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-family:var(--display);font-weight:800;font-size:28px;color:var(--white);letter-spacing:-2px;margin-bottom:16px}
.brand-name{font-family:var(--display);font-weight:800;font-size:36px;text-transform:uppercase;letter-spacing:3px;color:var(--white)}
.brand-name span{color:var(--red)}
.brand-sub{font-family:var(--body);font-size:14px;color:rgba(255,255,255,0.4);margin-top:6px;font-weight:300}
.auth-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:12px;overflow:hidden;backdrop-filter:blur(10px)}
.auth-tabs{display:flex;border-bottom:1px solid rgba(255,255,255,0.1)}
.auth-tab{flex:1;padding:20px;text-align:center;font-family:var(--display);font-weight:800;font-size:16px;text-transform:uppercase;letter-spacing:3px;color:rgba(255,255,255,0.2);cursor:pointer;transition:all .3s;border:none;background:rgba(255,255,255,0.02);border-bottom:2px solid transparent}
.auth-tab.active{color:var(--white);background:rgba(230,0,0,0.15);border-bottom:2px solid var(--red);text-shadow: 0 0 10px rgba(230,0,0,0.5)}
.auth-tab:hover:not(.active){color:rgba(255,255,255,0.6);background:rgba(255,255,255,0.05)}
.auth-form{padding:32px;display:none}
.auth-form.active{display:block}
.form-group{margin-bottom:20px}
.form-label{display:block;font-family:var(--display);font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,0.5);margin-bottom:8px}
.form-input{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:6px;padding:14px 16px;font-family:var(--body);font-size:15px;color:var(--white);outline:none;transition:border-color .2s}
.form-input:focus{border-color:var(--red)}
.form-input::placeholder{color:rgba(255,255,255,0.2)}
.role-toggle{display:flex;gap:8px;margin-bottom:20px}
.role-btn{flex:1;padding:14px;text-align:center;font-family:var(--display);font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:1px;border:2px solid rgba(255,255,255,0.15);border-radius:6px;background:none;color:rgba(255,255,255,0.5);cursor:pointer;transition:all .2s}
.role-btn.active{border-color:var(--red);background:rgba(230,0,0,0.15);color:var(--white)}
.role-btn:hover:not(.active){border-color:rgba(255,255,255,0.3)}
.submit-btn{width:100%;padding:16px;background:var(--red);color:var(--white);font-family:var(--display);font-weight:700;font-size:15px;text-transform:uppercase;letter-spacing:1px;border:none;border-radius:6px;cursor:pointer;transition:all .2s;margin-top:8px}
.submit-btn:hover{background:#cc0000;transform:translateY(-2px);box-shadow:0 8px 24px rgba(230,0,0,0.3)}
.submit-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.error-msg{background:rgba(230,0,0,0.15);border:1px solid rgba(230,0,0,0.3);border-radius:6px;padding:12px 16px;font-size:14px;color:#ff6b6b;margin-bottom:16px;display:none}
.error-msg.show{display:block}
.admin-hint{text-align:center;margin-top:20px;font-size:13px;color:rgba(255,255,255,0.25);font-family:var(--body)}
.admin-hint b{color:rgba(255,255,255,0.4)}
.particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.particle{position:absolute;width:4px;height:4px;background:var(--red);border-radius:50%;opacity:.15;animation:float 15s infinite linear}
@keyframes float{0%{transform:translateY(100vh) rotate(0deg);opacity:0}10%{opacity:.15}90%{opacity:.15}100%{transform:translateY(-100px) rotate(720deg);opacity:0}}
</style>
</head>
<body>
<div class="particles" id="particles"></div>
<div class="auth-container">
  <div class="brand">
    <div class="brand-logo">SI</div>
    <div class="brand-name">S-KILLING<span> it</span></div>
    <div class="brand-sub">Daily Execution Platform · Learn · Build · Submit</div>
  </div>
  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Login</button>
      <button class="auth-tab" onclick="switchTab('register')">Register</button>
    </div>
    <!-- LOGIN -->
    <div class="auth-form active" id="loginForm">
      <div class="error-msg" id="loginError"></div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" id="loginEmail" placeholder="you@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" id="loginPassword" placeholder="Enter password" autocomplete="current-password">
      </div>
      <button class="submit-btn" id="loginBtn" onclick="handleLogin()">Login →</button>
      <div class="admin-hint">Admin? Use <b>ashish21@gmail.com</b> / <b>killingit</b></div>
    </div>
    <!-- REGISTER -->
    <div class="auth-form" id="registerForm">
      <div class="error-msg" id="registerError"></div>
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input class="form-input" type="text" id="regName" placeholder="Your name">
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" id="regEmail" placeholder="you@email.com">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" id="regPassword" placeholder="Create password">
      </div>
      <label class="form-label">I am a</label>
      <div class="role-toggle">
        <button class="role-btn active" id="roleUser" onclick="selectRole('user')">👨‍💻 User</button>
        <button class="role-btn" id="roleAdmin" onclick="selectRole('admin')">🔧 Admin</button>
      </div>
      <button class="submit-btn" onclick="handleRegister()">Create Account →</button>
    </div>
  </div>
</div>
<script>
let selectedRole = 'user';
// Check if already logged in
const session = JSON.parse(localStorage.getItem('skillingit_session') || 'null');
if (session) {
  if (session.role === 'admin') window.location.href = '/admin';
  else window.location.href = '/';
}
function switchTab(tab) {
  document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
  if (tab === 'login') {
    document.querySelector('.auth-tab:first-child').classList.add('active');
    document.getElementById('loginForm').classList.add('active');
  } else {
    document.querySelector('.auth-tab:last-child').classList.add('active');
    document.getElementById('registerForm').classList.add('active');
  }
}
function selectRole(role) {
  selectedRole = role;
  document.getElementById('roleUser').classList.toggle('active', role === 'user');
  document.getElementById('roleAdmin').classList.toggle('active', role === 'admin');
}
async function handleLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginError');
  errEl.classList.remove('show');
  if (!email || !password) { errEl.textContent = 'Please fill in all fields.'; errEl.classList.add('show'); return; }
  try {
    const res = await fetch('/api/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password }) });
    const data = await res.json();
    if (!res.ok) { errEl.textContent = data.error; errEl.classList.add('show'); return; }
    localStorage.setItem('skillingit_session', JSON.stringify(data.account));
    if (data.account.role === 'admin') window.location.href = '/admin';
    else window.location.href = '/';
  } catch (e) { errEl.textContent = 'Server error. Is the backend running?'; errEl.classList.add('show'); }
}
async function handleRegister() {
  const name = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const password = document.getElementById('regPassword').value;
  const errEl = document.getElementById('registerError');
  errEl.classList.remove('show');
  if (!name || !email || !password) { errEl.textContent = 'Please fill in all fields.'; errEl.classList.add('show'); return; }
  try {
    const res = await fetch('/api/auth/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password, name, role: selectedRole }) });
    const data = await res.json();
    if (!res.ok) { errEl.textContent = data.error; errEl.classList.add('show'); return; }
    localStorage.setItem('skillingit_session', JSON.stringify(data.account));
    if (data.account.role === 'admin') window.location.href = '/admin';
    else window.location.href = '/';
  } catch (e) { errEl.textContent = 'Server error.'; errEl.classList.add('show'); }
}
// Enter key support
document.getElementById('loginPassword').addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
document.getElementById('regPassword').addEventListener('keydown', e => { if (e.key === 'Enter') handleRegister(); });
// Particles
const pc = document.getElementById('particles');
for (let i = 0; i < 20; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  p.style.left = Math.random()*100+'%';
  p.style.animationDelay = Math.random()*15+'s';
  p.style.animationDuration = (10+Math.random()*20)+'s';
  pc.appendChild(p);
}
</script>
</body>
</html>
